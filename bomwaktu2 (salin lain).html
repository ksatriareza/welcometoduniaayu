<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Timer 07/07/2027</title>
<style>
body {
  background: url('https://i.imgur.com/8VIXH24.jpeg') no-repeat center 30% / cover;
  color: #ff3333;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  margin: 0;
  font-family: 'Courier New', monospace;
  flex-direction: column;
}

.judul {
  font-size: 18px;
  letter-spacing: 3px;
  margin-bottom: 20px;
  animation: blink 1.5s infinite;
}

.timer {
  display: flex;
  gap: 30px;
  text-align: center;
}

.box {
  background: #111;
  border: 2px solid #ff3333;
  padding: 20px 25px;
  min-width: 90px;
  box-shadow: 0 0 20px rgba(255,0,0,0.4);
}

.angka {
  font-size: 60px;
  font-weight: bold;
  line-height: 1;
}

.label {
  font-size: 14px;
  margin-top: 5px;
  color: #ccc;
  letter-spacing: 2px;
}

.target {
  margin-top: 25px;
  font-size: 16px;
  color: #d4af37;
  letter-spacing: 1px;
}

@keyframes blink {
 0%, 50% { opacity: 1; }
 51%, 100% { opacity: 0.5; }
}
</style>
</head>

<div class="judul">SELAMAT DATANG DI DUNIA AYU - DUNIA VIRUS </div>

<div class="timer">
  <div class="box">
    <div class="angka" id="days">000</div>
    <div class="label">HARI</div>
  </div>
  <div class="box">
    <div class="angka" id="hours">00</div>
    <div class="label">JAM</div>
  </div>
  <div class="box">
    <div class="angka" id="minutes">00</div>
    <div class="label">MENIT</div>
  </div>
  <div class="box">
    <div class="angka" id="seconds">00</div>
    <div class="label">DETIK</div>
  </div>
</div>

<div class="target">TARGET: 07 JULI 2027 00:00:00</div>


</body>
 <div style="display: flex; justify-content: center;">
        <img src="gambar3.gif" width="100%">
    </div>

</html>





  <audio id="lagu" src="musik.mp3" autoplay loop></audio>


<script>


const targetDate = new Date("2027-07-07T00:00:00").getTime();

setInterval(function() {
  const now = new Date().getTime();
  const distance = targetDate - now;

  if (distance < 0) {
    document.querySelector(".judul").innerHTML = "WAKTU HABIS! INI HARI H LU!";
    document.querySelector(".judul").style.color = "gold";
    document.querySelector(".target").innerHTML = "UDAH GAK ADA WAKTU LAGI MIN";
    clearInterval();
    return;
  }

  const days = Math.floor(distance / (1000 * 60 * 60 * 24));
  const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
  const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
  const seconds = Math.floor((distance % (1000 * 60)) / 1000);

  document.getElementById("days").innerHTML = days.toString().padStart(3, '0');
  document.getElementById("hours").innerHTML = hours.toString().padStart(2, '0');
  document.getElementById("minutes").innerHTML = minutes.toString().padStart(2, '0');
  document.getElementById("seconds").innerHTML = seconds.toString().padStart(2, '0');
}, 1000);

 
</script>

</body>
